<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ammar Nawawi — drive the Sheepdog (prototype)</title>
<style>
  :root{--bg:#12151c;--ink:#dfe3ec;--dim:#828b9d;--acc:#d9804f;--ok:#7fa477;
    --mono:ui-monospace,Menlo,Consolas,monospace;--serif:"Iowan Old Style","Palatino Linotype",Georgia,serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  canvas{display:block}
  .hud{position:fixed;font-family:var(--mono);color:var(--ink);z-index:10;user-select:none}
  #title{top:18px;left:22px}
  #title b{font:700 15px/1.3 var(--mono);letter-spacing:.04em}
  #title span{display:block;font-size:10.5px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
  #skip{top:18px;right:22px;font:700 11px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink);border:1px solid rgba(223,227,236,.35);padding:10px 14px;text-decoration:none;background:rgba(18,21,28,.55);backdrop-filter:blur(4px)}
  #skip:hover{border-color:var(--acc);color:var(--acc)}
  #controls{bottom:18px;left:22px;font-size:11px;color:var(--dim);letter-spacing:.06em}
  #controls b{color:var(--ink)}
  #speed{bottom:18px;right:22px;font-size:11px;color:var(--dim);text-align:right}
  #speed b{display:block;font-size:20px;color:var(--ink)}
  #card{position:fixed;left:50%;bottom:64px;transform:translateX(-50%) translateY(20px);opacity:0;transition:all .25s;
    background:rgba(18,21,28,.92);border:1px solid rgba(223,227,236,.25);border-top:3px solid var(--acc);
    padding:16px 20px;max-width:430px;z-index:20;pointer-events:none}
  #card.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #card h3{font:700 15px/1.35 var(--serif);color:var(--ink);margin-bottom:5px}
  #card p{font:12.5px/1.6 var(--mono);color:var(--dim)}
  #card a{color:var(--acc)}
  #card .go{font:700 10.5px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}
  #joy{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:110px;height:110px;border:1px solid rgba(223,227,236,.25);
    border-radius:50%;z-index:15;display:none;touch-action:none}
  #joy .nub{position:absolute;left:50%;top:50%;width:44px;height:44px;border-radius:50%;background:rgba(217,128,79,.5);transform:translate(-50%,-50%)}
  @media (pointer:coarse){#joy{display:block}#controls{display:none}}
</style>
</head>
<body>
<div class="hud" id="title"><b>AMMAR NAWAWI</b><span>process engineer · builder · drive to explore · prototype — world under construction</span></div>
<a class="hud" id="skip" href="/">skip — just show me the work</a>
<div class="hud" id="controls"><b>W A S D</b> or arrows to drive · drive into a station to see it</div>
<div class="hud" id="speed"><b id="spd">0.0</b>ft/s · sheepdog myRIO-1900</div>
<div id="card"><h3 id="card-t"></h3><p id="card-p"></p></div>
<div id="joy"><div class="nub" id="nub"></div></div>

<script type="module">
import * as THREE from './vendor/three.module.js';

const NAVY=0x12151c, PANEL=0x181d27, INK=0xdfe3ec, DIM=0x828b9d, ACC=0xd9804f, OK=0x7fa477, ELEV=0x202634;

const scene = new THREE.Scene();
scene.background = new THREE.Color(NAVY);
scene.fog = new THREE.Fog(NAVY, 60, 140);

const cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, .1, 300);
const ren = new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth, innerHeight); ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled = true; ren.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(ren.domElement);

scene.add(new THREE.HemisphereLight(0x8fa3c8, 0x1a1410, 1.1));
const sun = new THREE.DirectionalLight(0xffe8d0, 1.6);
sun.position.set(30,50,20); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-70,right:70,top:70,bottom:-70});
scene.add(sun);

/* ── ground = control chart ── */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400,400), new THREE.MeshStandardMaterial({color:PANEL,roughness:.95}));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

function stripe(z,color,w=.35,dash=false){
  if(!dash){ const m=new THREE.Mesh(new THREE.PlaneGeometry(400,w),new THREE.MeshBasicMaterial({color}));
    m.rotation.x=-Math.PI/2; m.position.set(0,.02,z); scene.add(m); return; }
  for(let x=-200;x<200;x+=6){ const m=new THREE.Mesh(new THREE.PlaneGeometry(3,w),new THREE.MeshBasicMaterial({color}));
    m.rotation.x=-Math.PI/2; m.position.set(x+1.5,.02,z); scene.add(m); }
}
stripe(0, OK, .5);          // CL — the road center
stripe(-14, ACC, .3, true); // UCL
stripe(14, ACC, .3, true);  // LCL
stripe(-22, DIM, .22, true); // USL
stripe(22, DIM, .22, true);  // LSL

/* data points along the chart — the "process" */
const pts=[]; let px=-160;
while(px<200){ const z=(Math.sin(px*.13)+Math.sin(px*.31)*.5)*6;
  const ooc = (px>34&&px<40);
  const p=new THREE.Mesh(new THREE.SphereGeometry(ooc?1.5:.9,16,16),
    new THREE.MeshStandardMaterial({color:ooc?ACC:INK,roughness:.4,emissive:ooc?ACC:0x000000,emissiveIntensity:ooc?.5:0}));
  p.position.set(px, ooc?1.5:.9, ooc?-17:z); p.castShadow=true; scene.add(p); pts.push(p); px+=8; }

/* ── the Sheepdog — modeled on the real ME375 robot (FinalProject fig. 2) ── */
const bot = new THREE.Group();
const chassisG = new THREE.Group(); bot.add(chassisG);   // sub-group for pitch/roll juice

const BLUE=0x2f63c9, YELLOW=0xe8c23a, PCB_RED=0xb8302e, GRAY=0x3a3f47;

// blue chassis plate (with a front nose for the caster)
const plate = new THREE.Mesh(new THREE.BoxGeometry(3.6,.22,2.5), new THREE.MeshStandardMaterial({color:BLUE,roughness:.55}));
plate.position.y=.95; plate.castShadow=true; chassisG.add(plate);
const nose = new THREE.Mesh(new THREE.BoxGeometry(1.1,.22,1.5), new THREE.MeshStandardMaterial({color:BLUE,roughness:.55}));
nose.position.set(2.1,.95,0); nose.castShadow=true; chassisG.add(nose);

// 12V lead-acid battery (black block, rear)
const batt = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.05,1.15), new THREE.MeshStandardMaterial({color:0x101114,roughness:.35}));
batt.position.set(-1.0,1.65,-.55); batt.castShadow=true; chassisG.add(batt);

// NI myRIO (gray slab, front-right of deck) + status LED
const rio = new THREE.Mesh(new THREE.BoxGeometry(1.7,.45,1.15), new THREE.MeshStandardMaterial({color:GRAY,roughness:.4,metalness:.2}));
rio.position.set(.55,1.3,.6); rio.castShadow=true; chassisG.add(rio);
const rioStripe = new THREE.Mesh(new THREE.BoxGeometry(1.7,.46,.18), new THREE.MeshStandardMaterial({color:0xdfe3ec,roughness:.4}));
rioStripe.position.set(.55,1.3,.12); chassisG.add(rioStripe);
const led = new THREE.Mesh(new THREE.SphereGeometry(.09,8,8), new THREE.MeshStandardMaterial({color:0x7fa477,emissive:0x7fa477,emissiveIntensity:1.5}));
led.position.set(1.3,1.56,.6); chassisG.add(led);

// red H-bridge driver PCB
const pcb = new THREE.Mesh(new THREE.BoxGeometry(.85,.12,.65), new THREE.MeshStandardMaterial({color:PCB_RED,roughness:.5}));
pcb.position.set(.4,1.12,-.6); chassisG.add(pcb);

// wires (battery → myRIO → driver)
function wire(pts,color){ const c=new THREE.CatmullRomCurve3(pts.map(p=>new THREE.Vector3(...p)));
  const m=new THREE.Mesh(new THREE.TubeGeometry(c,20,.045,6), new THREE.MeshStandardMaterial({color,roughness:.6}));
  chassisG.add(m); }
wire([[-.5,2.1,-.5],[0,2.3,0],[.5,1.6,.6]],0xb8302e);
wire([[-.6,2.05,-.7],[-.1,2.2,-.4],[.4,1.25,-.6]],0x111111);

// yellow-hub wheels with black knobby tires (mid-mounted, the drive pair)
const wheels=[];
for(const zSide of [1.45,-1.45]){
  const g=new THREE.Group();
  const tire=new THREE.Mesh(new THREE.CylinderGeometry(.8,.8,.5,24), new THREE.MeshStandardMaterial({color:0x0c0d10,roughness:.9}));
  tire.rotation.x=Math.PI/2; tire.castShadow=true; g.add(tire);
  for(let i=0;i<12;i++){ const lug=new THREE.Mesh(new THREE.BoxGeometry(.16,.12,.5),new THREE.MeshStandardMaterial({color:0x1a1c20,roughness:.9}));
    const a=i/12*Math.PI*2; lug.position.set(Math.cos(a)*.8,Math.sin(a)*.8,0); lug.rotation.z=a; lug.rotation.x=Math.PI/2; tire.add? g.add(lug):0; }
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(.46,.46,.54,20), new THREE.MeshStandardMaterial({color:YELLOW,roughness:.5}));
  hub.rotation.x=Math.PI/2; g.add(hub);
  g.position.set(-.4,.8,zSide); bot.add(g); wheels.push(g);
}
// yellow TT gear motors (inboard of wheels)
for(const zSide of [.95,-.95]){
  const mot=new THREE.Mesh(new THREE.BoxGeometry(1.15,.5,.45), new THREE.MeshStandardMaterial({color:YELLOW,roughness:.55}));
  mot.position.set(-.4,.8,zSide); mot.castShadow=true; chassisG.add(mot);
}
// encoder discs (black, on motor shafts)
for(const zSide of [.68,-.68]){
  const d=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.06,16), new THREE.MeshStandardMaterial({color:0x0c0d10,roughness:.4}));
  d.rotation.x=Math.PI/2; d.position.set(.25,.8,zSide); chassisG.add(d);
}
// front ball caster (silver ball in dark housing)
const casterH = new THREE.Mesh(new THREE.CylinderGeometry(.28,.34,.3,14), new THREE.MeshStandardMaterial({color:0x14161a,roughness:.6}));
casterH.position.set(2.25,.62,0); chassisG.add(casterH);
const casterB = new THREE.Mesh(new THREE.SphereGeometry(.24,14,14), new THREE.MeshStandardMaterial({color:0xb9c1cc,roughness:.15,metalness:.9}));
casterB.position.set(2.25,.42,0); chassisG.add(casterB);
scene.add(bot);

/* ── stations ── */
function makeStation(x,z,color,title,desc){
  const g=new THREE.Group();
  const base=new THREE.Mesh(new THREE.CylinderGeometry(6.5,6.5,.25,40),new THREE.MeshStandardMaterial({color:ELEV,roughness:.9}));
  base.position.y=.12; base.receiveShadow=true; g.add(base);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(6.5,.12,10,60),new THREE.MeshBasicMaterial({color}));
  ring.rotation.x=Math.PI/2; ring.position.y=.28; g.add(ring);
  const mono=new THREE.Mesh(new THREE.BoxGeometry(3.2,5.5,.7),new THREE.MeshStandardMaterial({color:PANEL,roughness:.5}));
  mono.position.y=3; mono.castShadow=true; g.add(mono);
  const glow=new THREE.Mesh(new THREE.PlaneGeometry(2.6,4.6),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.85}));
  glow.position.set(0,3,.4); g.add(glow);
  g.position.set(x,0,z); scene.add(g);
  return {x,z,title,desc,ring,glow};
}
const stations=[
  makeStation(38,-17,ACC,"Case Study 01 — the honest null",
    "This OOC point is real: I audited my own trading system across 1,578 trades and killed my best result. <a href='#'>Read the study →</a>"),
  makeStation(-40,26,OK,"The Bench — live instruments",
    "Real Cpk from my production-style SPC platform, a working terminal, and this robot's actual PI control sim. <a href='#'>Visit the bench →</a>"),
  makeStation(90,20,0x8fa3c8,"Arcade — the games corner",
    "I love video games. There's a 2048 easter egg, and this whole world is one. <a href='#'>More toys →</a>"),
];

/* ── closed-loop PI physics — the real ME375 controllers ──
   plants:  G_LW = 5.87/(0.73s+1) · G_RW = 5.81/(0.69s+1)
   PI:      C_LW = (0.2946s+1.294)/s · C_RW = (0.2767s+1.264)/s  (design response 0.5671 s) */
const KL=5.87, tauL=.73, KR=5.81, tauR=.69;
const KpL=.2946, KiL=1.294, KpR=.2767, KiR=1.264;
const UMAX=3.2;                       // duty saturation
const GAME_SCALE=6;                   // real ref was 1.5 ft/s — overclocked for fun
let vL=0, vR=0, iL=0, iR=0, heading=0, X=-20, Z=6, prevV=0;
let untuned=false;                    // easter egg: pre-tuning left-pull (report §Discussion)
const TRACK=2.9, VREF=1.5*GAME_SCALE;
const keys={};
addEventListener('keydown',e=>{const k=e.key.toLowerCase(); keys[k]=true;
  if(k==='u'){untuned=!untuned; document.getElementById('spd').nextSibling.textContent = untuned?' ft/s · UNTUNED (pulls left!)':' ft/s · sheepdog myRIO-1900';}
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function wheelStep(v,integ,ref,Kp,Ki,K,tau,dt){
  const err = ref - v;
  let u = Kp*err + Ki*(integ + err*dt);
  if (u > UMAX || u < -UMAX){ u = Math.max(-UMAX, Math.min(UMAX, u)); }  // clamp
  else { integ += err*dt; }                                              // anti-windup: integrate only unclamped
  const vNew = v + ((K*u) - v)/tau*dt;
  return [vNew, integ];
}

/* touch joystick */
let joyX=0, joyY=0;
const joy=document.getElementById('joy'), nub=document.getElementById('nub');
joy.addEventListener('touchstart',h,{passive:false}); joy.addEventListener('touchmove',h,{passive:false});
joy.addEventListener('touchend',()=>{joyX=joyY=0;nub.style.transform='translate(-50%,-50%)';});
function h(e){ e.preventDefault(); const r=joy.getBoundingClientRect(), t=e.touches[0];
  joyX=Math.max(-1,Math.min(1,(t.clientX-r.left-55)/45)); joyY=Math.max(-1,Math.min(1,(t.clientY-r.top-55)/45));
  nub.style.transform=`translate(calc(-50% + ${joyX*32}px), calc(-50% + ${joyY*32}px))`; }

const card=document.getElementById('card'), cardT=document.getElementById('card-t'), cardP=document.getElementById('card-p');
let activeStation=null;

const clock=new THREE.Clock();
function tick(){
  const dt=Math.min(clock.getDelta(),.05);
  const fwd=(keys['w']||keys['arrowup']?1:0)-(keys['s']||keys['arrowdown']?1:0) - joyY;
  const turn=(keys['a']||keys['arrowleft']?1:0)-(keys['d']||keys['arrowright']?1:0) - joyX;
  const refL = VREF*Math.max(-1,Math.min(1,fwd - .6*turn)) * (untuned?.62:1);
  const refR = VREF*Math.max(-1,Math.min(1,fwd + .6*turn));
  [vL,iL] = wheelStep(vL,iL,refL, untuned?KpL*.4:KpL, untuned?KiL*.4:KiL, KL,tauL, dt);
  [vR,iR] = wheelStep(vR,iR,refR, KpR,KiR, KR,tauR, dt);
  const v=(vL+vR)/2, w=(vR-vL)/TRACK;
  heading += w*dt;
  X += Math.cos(heading)*v*dt; Z -= Math.sin(heading)*v*dt;
  bot.position.set(X,0,Z); bot.rotation.y=heading;
  wheels[0].rotation.z -= vL*dt/.8;          // each wheel spins at ITS OWN speed
  wheels[1].rotation.z -= vR*dt/.8;
  const accel=(v-prevV)/Math.max(dt,1e-4); prevV=v;
  chassisG.rotation.z = THREE.MathUtils.lerp(chassisG.rotation.z, -accel*.006, .15);  // pitch under accel
  chassisG.rotation.x = THREE.MathUtils.lerp(chassisG.rotation.x,  w*v*.004,  .15);  // lean in turns
  led.material.emissiveIntensity = 1 + Math.sin(performance.now()/250)*.6;

  /* chase cam */
  const cx=X - Math.cos(heading)*13, cz=Z + Math.sin(heading)*13;
  cam.position.lerp(new THREE.Vector3(cx, 9.5, cz), 1-Math.pow(.001,dt));
  cam.lookAt(X, 1.2, Z);

  /* stations proximity */
  let near=null;
  for(const s of stations){ const d=Math.hypot(X-s.x, Z-s.z);
    s.ring.rotation.z += dt*.6;
    s.glow.material.opacity = .55 + Math.sin(performance.now()/400)*.3;
    if(d<8) near=s; }
  if(near!==activeStation){ activeStation=near;
    if(near){ cardT.textContent=near.title; cardP.innerHTML=near.desc; card.classList.add('show'); }
    else card.classList.remove('show'); }

  document.getElementById('spd').textContent=Math.abs(v).toFixed(1);
  ren.render(scene,cam);
  requestAnimationFrame(tick);
}
tick();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
